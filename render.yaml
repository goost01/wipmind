databases:
  - name: wipmind-db
    databaseName: wipmind
    user: wipmind
    plan: free

services:
  - type: web
    name: wipmind
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn wipmind_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: wipmind-db
          property: connectionString
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: wipmind
          property: host
