<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WipMind{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
{% block body %}{% endblock %}

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<script src="{% static 'js/toast.js' %}"></script>
<script src="{% static 'js/api.js' %}"></script>
{% block scripts %}{% endblock %}

<script>
(function () {
  const sidebar  = document.querySelector('.sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const topbar   = document.querySelector('.topbar');
  if (!sidebar || !topbar) return;

  const btn = document.createElement('button');
  btn.className = 'btn-hamburger';
  btn.setAttribute('aria-label', 'Abrir menú');
  btn.textContent = '☰';
  topbar.insertBefore(btn, topbar.firstChild);

  function open()  { sidebar.classList.add('open');  overlay.classList.add('active'); }
  function close() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

  btn.addEventListener('click', open);
  overlay.addEventListener('click', close);

  sidebar.querySelectorAll('.nav-link').forEach(link =>
    link.addEventListener('click', close)
  );
})();
</script>
</body>
</html>
