{% extends "base.html" %}
{% load static %}
{% block title %}Mis Tareas — WipMind{% endblock %}

{% block body %}
<div class="app-layout">
  <nav class="sidebar">
    <a href="/dashboard/" class="sidebar-logo"><span>🧠</span> WipMind</a>
    <a href="/dashboard/" class="nav-link"><span class="icon">📊</span> Dashboard</a>
    <a href="/tasks/"     class="nav-link active"><span class="icon">📝</span> Mis Tareas</a>
    <a href="/profile/"   class="nav-link"><span class="icon">👤</span> Perfil</a>
    <div class="sidebar-spacer"></div>
    <button class="nav-link" id="btn-logout" style="background:none;border:none;cursor:pointer;width:100%;text-align:left">
      <span class="icon">🚪</span> Cerrar sesión
    </button>
  </nav>

  <header class="topbar">
    <span class="page-title">Mis Tareas</span>
    <button class="btn btn-primary" id="btn-new-task">+ Nueva Tarea</button>
  </header>

  <main class="main-content">

    <!-- Filtros -->
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="min-width:150px">
          <label class="form-label">Estado</label>
          <select class="form-select" id="filter-estado">
            <option value="">Todos</option>
            <option value="TODO">Por Hacer</option>
            <option value="IN_PROGRESS">En Proceso</option>
            <option value="DONE">Terminadas</option>
          </select>
        </div>
        <div class="form-group" style="min-width:150px">
          <label class="form-label">Prioridad</label>
          <select class="form-select" id="filter-prioridad">
            <option value="">Todas</option>
            <option value="ALTA">Alta</option>
            <option value="MEDIA">Media</option>
            <option value="BAJA">Baja</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;min-width:180px">
          <label class="form-label">Asignatura</label>
          <input class="form-input" type="text" id="filter-asignatura" placeholder="Buscar asignatura…">
        </div>
        <button class="btn btn-ghost" id="btn-filter">🔍 Filtrar</button>
        <button class="btn btn-ghost" id="btn-clear-filter">✕ Limpiar</button>
      </div>
    </div>

    <!-- Lista de tareas -->
    <div id="task-list-container">
      <p class="text-muted text-sm">Cargando tareas…</p>
    </div>

  </main>
</div>

<!-- Modal de Tarea (mismo que dashboard) -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="task-modal-title">Nueva Tarea</span>
      <button class="btn-icon" id="btn-close-modal">✕</button>
    </div>
    <form id="task-form" novalidate>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="field-titulo">Título *</label>
          <input class="form-input" type="text" id="field-titulo" placeholder="Ej: Informe de Cálculo" required>
          <span class="form-error" id="err-titulo"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-asignatura">Asignatura *</label>
          <input class="form-input" type="text" id="field-asignatura" placeholder="Ej: Cálculo I" required>
          <span class="form-error" id="err-asignatura"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-descripcion">Descripción</label>
          <textarea class="form-textarea" id="field-descripcion" rows="2" placeholder="Detalles opcionales…"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label" for="field-fecha">Fecha de entrega *</label>
            <input class="form-input" type="date" id="field-fecha" required>
            <span class="form-error" id="err-fecha_entrega"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="field-prioridad">Prioridad</label>
            <select class="form-select" id="field-prioridad">
              <option value="ALTA">🔴 Alta</option>
              <option value="MEDIA" selected>🟡 Media</option>
              <option value="BAJA">🟢 Baja</option>
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label" for="field-dificultad">Dificultad (1–5)</label>
            <input class="form-input" type="number" id="field-dificultad" min="1" max="5" value="3">
            <span class="form-error" id="err-dificultad_estimada"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="field-horas">Horas estimadas</label>
            <input class="form-input" type="number" id="field-horas" min="0.5" step="0.5" placeholder="Opcional">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('task-modal').classList.remove('open')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar tarea</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/tasks.js' %}"></script>
<script src="{% static 'js/density.js' %}"></script>
<script>
// Render de lista (no tablero) para esta página
window.renderTaskList = function(tasks) {
  const container = document.getElementById('task-list-container');
  if (!tasks.length) {
    container.innerHTML = `
      <div class="card" style="text-align:center;padding:48px">
        <p style="font-size:2.5rem;margin-bottom:12px">📭</p>
        <p class="font-bold">No tienes tareas todavía</p>
        <p class="text-muted text-sm">Haz clic en "+ Nueva Tarea" para comenzar.</p>
      </div>`;
    return;
  }

  const STATUS_LABEL = { TODO:'Por Hacer', IN_PROGRESS:'En Proceso', DONE:'Terminado' };
  const STATUS_COLOR = { TODO:'#e0e7ff', IN_PROGRESS:'#fef9c3', DONE:'#dcfce7' };
  const STATUS_TEXT  = { TODO:'#4338ca', IN_PROGRESS:'#854d0e', DONE:'#15803d' };

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${tasks.map(t => {
        const days = Math.ceil((new Date(t.fecha_entrega+'T00:00:00') - new Date()) / 86400000);
        const urgClass = days <= 2 ? 'color:#b91c1c;font-weight:600' : 'color:var(--color-text-muted)';
        return `
        <div class="card" style="display:flex;align-items:center;gap:16px;padding:14px 18px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="font-weight:600">${escHtml(t.titulo)}</span>
              <span class="badge badge-priority-${t.prioridad}">${t.prioridad}</span>
              <span style="font-size:.72rem;padding:2px 8px;border-radius:999px;background:${STATUS_COLOR[t.estado]};color:${STATUS_TEXT[t.estado]};font-weight:600">
                ${STATUS_LABEL[t.estado]}
              </span>
            </div>
            <div style="display:flex;gap:12px;font-size:.78rem;flex-wrap:wrap">
              <span style="color:var(--color-text-muted)">📚 ${escHtml(t.asignatura)}</span>
              <span style="${urgClass}">📅 ${t.fecha_entrega} (${days}d)</span>
              <span style="color:var(--color-text-muted)">⚡ Dif. ${t.dificultad_estimada}/5</span>
              ${t.tiempo_estimado_horas ? `<span style="color:var(--color-text-muted)">🕐 ${t.tiempo_estimado_horas}h est.</span>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn-icon" onclick="TaskManager.openEdit(${t.id})" title="Editar">✏️</button>
            <button class="btn-icon" onclick="TaskManager.confirmDelete(${t.id})" title="Eliminar">🗑️</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
};

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('btn-logout').addEventListener('click', async () => {
  await WipMindAPI.Auth.logout().catch(() => {});
  window.location.href = '/login/';
});

document.getElementById('btn-filter').addEventListener('click', () => applyFilters());
document.getElementById('btn-clear-filter').addEventListener('click', () => {
  document.getElementById('filter-estado').value = '';
  document.getElementById('filter-prioridad').value = '';
  document.getElementById('filter-asignatura').value = '';
  TaskManager.loadAndRender();
});

async function applyFilters() {
  const params = {};
  const estado = document.getElementById('filter-estado').value;
  const prioridad = document.getElementById('filter-prioridad').value;
  const asignatura = document.getElementById('filter-asignatura').value.trim();
  if (estado) params.estado = estado;
  if (prioridad) params.prioridad = prioridad;
  if (asignatura) params.asignatura = asignatura;

  try {
    const tasks = await WipMindAPI.Tasks.list(params);
    window.renderTaskList(tasks);
  } catch (err) {
    Toast.error(err.message);
  }
}

document.getElementById('field-fecha').min = new Date().toISOString().split('T')[0];
TaskManager.init();
TaskManager.loadAndRender();
</script>
{% endblock %}
