{% extends "base.html" %}
{% block title %}Iniciar sesión — WipMind{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🧠 WipMind</div>
    <p class="auth-subtitle">Organiza tu estudio. Cuida tu mente.</p>

    <div id="login-error" class="notification-banner CRITICA hidden" style="margin-bottom:16px">
      <span>⚠️</span>
      <span id="login-error-msg"></span>
    </div>

    <form class="auth-form" id="login-form" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="username">Usuario o correo</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="tu@correo.com" autocomplete="username" required>
        <span class="form-error" id="err-username"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
        <span class="form-error" id="err-password"></span>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="btn-login">
        Iniciar sesión
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a href="/register/">Regístrate gratis</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const errBanner = document.getElementById('login-error');
  const errMsg = document.getElementById('login-error-msg');
  errBanner.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Entrando…';

  try {
    await WipMindAPI.Auth.login({
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value,
    });
    window.location.href = '/dashboard/';
  } catch (err) {
    errMsg.textContent = err.message;
    errBanner.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
});
</script>
{% endblock %}
